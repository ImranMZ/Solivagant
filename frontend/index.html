<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Brand & Website Generator</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
    <div class="bg-mesh"></div>
    
    <header class="glass-nav">
        <div class="nav-content">
            <div class="brand">
                <i data-lucide="sparkles" class="logo-icon"></i>
                <span class="brand-name">Solivagant</span>
            </div>
            <div class="nav-actions">
                <button class="nav-btn" onclick="scrollToForm()">Create</button>
                <div class="user-pill">
                    <span>Pro</span>
                </div>
            </div>
        </div>
    </header>

    <main class="app-stage">
        <div class="hero-text">
            <h1>Create your brand.</h1>
            <p>High-end identity generation powered by AI.</p>
        </div>

        <section class="glass-card form-section" id="generationForm">
            <div class="card-header">
                <h2>Build Identity</h2>
                <div class="status-indicator"><span class="dot"></span>Live</div>
            </div>
            <form id="brandForm" class="bento-form">
                <div class="input-stack">
                    <div class="input-field">
                        <label>Business Name</label>
                        <input type="text" id="businessName" placeholder="e.g. Luminar" required />
                    </div>
                    <div class="input-field">
                        <label>Tagline</label>
                        <input type="text" id="tagline" placeholder="e.g. Future focused" required />
                    </div>
                </div>
                <div class="input-stack">
                    <div class="input-field">
                        <label>Industry</label>
                        <select id="industry" required>
                            <option value="Technology">Technology</option>
                            <option value="Finance">Finance</option>
                            <option value="Creative">Creative</option>
                        </select>
                    </div>
                    <div class="input-field">
                        <label>Color Style</label>
                        <select id="colorScheme" required>
                            <option value="modern">Modern Blue</option>
                            <option value="professional">Professional Slate</option>
                            <option value="vibrant">Vibrant Bloom</option>
                        </select>
                    </div>
                </div>
                <button type="submit" class="glow-button">Generate Assets</button>
            </form>
            
            <div id="loadingIndicator" class="glass-loading" style="display:none;">
                <div class="ios-spinner"></div>
                <p>Synthesizing Design...</p>
            </div>
        </section>

        <section id="resultsSection" class="results-grid" style="display:none;">
            <!-- Logo Card -->
            <article class="glass-card bento-card logo-card" id="logoCard">
                <div class="card-tag">Logo</div>
                <div class="logo-display">
                    <img id="logoImage" src="" alt="Logo" />
                </div>
                <div class="card-footer">
                    <a id="logoDownload" href="#" download class="icon-btn"><i data-lucide="download"></i></a>
                </div>
            </article>

            <!-- Palette Card -->
            <article class="glass-card bento-card palette-card" id="paletteCard">
                <div class="card-tag">Palette</div>
                <div id="paletteRow" class="palette-viz"></div>
                <div class="palette-info">
                    <h3 id="themeName"></h3>
                    <div id="paletteSuggestions"></div>
                </div>
            </article>

            <!-- Website Preview Card -->
            <article class="glass-card bento-card website-card" id="websiteCard">
                <div class="card-tag">Product Landing</div>
                <div class="preview-mock">
                    <div class="mock-content"></div>
                    <button onclick="showWebsitePreview()" class="blur-btn">Preview Site</button>
                </div>
            </article>

            <!-- Metadata Card -->
            <article class="glass-card bento-card seo-card" id="seoCard">
                <div class="card-tag">SEO Meta</div>
                <div id="seoMetadata" class="seo-scroll"></div>
            </article>

            <!-- Design Specs Card (Wide) -->
            <article class="glass-card bento-card specs-card full-width" id="designDetails">
                <div class="card-tag">System Specs</div>
                <div class="specs-content">
                    <div class="spec-row">
                        <div class="spec-label">Font Family</div>
                        <div id="fontFamily" class="spec-value"></div>
                    </div>
                    <div class="spec-row">
                        <div class="spec-label">Brand Tone</div>
                        <div id="brandTone" class="spec-value"></div>
                    </div>
                    <div class="spec-row">
                        <div class="spec-label">Core Features</div>
                        <ul id="featureList" class="spec-list"></ul>
                    </div>
                </div>
            </article>
        </section>
    </main>

    <!-- Modal for Website Preview -->
    <div id="websiteModal" class="glass-modal">
        <div class="modal-surface">
            <div class="modal-top">
                <span>Site Preview</span>
                <button class="close-pill" onclick="closeWebsitePreview()">Close</button>
            </div>
            <div id="websitePreview" class="iframe-wrap"></div>
        </div>
    </div>

    <script src="script.js"></script>
    <script>
        lucide.createIcons();
    </script>
</body>
</html>
